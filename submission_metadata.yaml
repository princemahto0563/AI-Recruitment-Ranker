ai_usage_summary: |
  Used Gemini for solution architecture planning, code modularization, and helper script design. No candidate profile data was fed into external APIs.

methodology_summary: |
  A hybrid scoring architecture combining semantic cosine similarity (using local BGE-small embeddings and FAISS index search) with lexical BM25 skill overlap matching, experience target alignments, and company pedigree weights (startup/Big Tech booster and IT services penalty). Applies multiplicative modifiers for login recency, notice periods, and response rates. Leverages a custom 4-tier profile validation script to pre-filter and drop all 88 honeypot profiles before scoring.

